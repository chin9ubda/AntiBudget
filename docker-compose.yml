services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: antibudget
      POSTGRES_USER: antibudget
      POSTGRES_PASSWORD: ${DB_PASSWORD} 
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: .
    ports:
      - "18081:18081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
