name: Publish Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build backend image
        run: |
          docker build -f Dockerfile -t ghcr.io/${{ github.repository_owner }}/antibudget-backend:latest .
      - name: Build frontend image
        run: |
          docker build -f frontend/Dockerfile -t ghcr.io/${{ github.repository_owner }}/antibudget-frontend:latest ./frontend

      - name: Push backend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/antibudget-backend:latest
      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/antibudget-frontend:latest
