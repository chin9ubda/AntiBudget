name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle','**/gradle-wrapper.properties') }}
      - name: Build backend
        run: ./gradlew clean build -x test --no-daemon
      - name: Run unit tests
        run: ./gradlew test --no-daemon
      - name: Archive backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: build/libs/*.jar

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Lint
        run: |
          cd frontend
          npm run lint || true
      - name: Build
        run: |
          cd frontend
          npm run build
      - name: Archive frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run npm audit (frontend)
        run: |
          cd frontend
          npm ci
          npm audit --json > npm-audit.json || true
      - name: Run OWASP Dependency-Check (backend)
        uses: stevespringett/dependency-check-action@v2
        with:
          scanpath: '.'
